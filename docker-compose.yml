version: '3.8'

services:
  ros2_app:
    build: .
    container_name: ros2_jazzy_container
    volumes:
      # Магия монтирования: текущая папка на ПК друга (где src) 
      # связывается с папкой /ros2_ws внутри контейнера
      - .:/ros2_ws
    # Оставляем контейнер запущенным и подгружаем ROS окружение
    command: sleep infinity
